name: Build Desktop

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter pub get

      - name: Enable Windows desktop and build
        run: |
          flutter config --enable-windows-desktop
          flutter build windows --release

      - name: Collect build files for installer
        run: |
          New-Item -ItemType Directory -Force -Path scripts\build_input
          echo "=== x64 runner Release ==="
          Get-ChildItem build\windows\x64\runner\Release | Select-Object Name | Format-Table -AutoSize
          echo "=== x64 flutter Release ==="
          Get-ChildItem build\windows\x64\flutter\Release | Select-Object Name | Format-Table -AutoSize
          # Copy all built files
          Copy-Item -Recurse build\windows\x64\runner\Release\* scripts\build_input\
          Copy-Item build\windows\x64\flutter\Release\*.dll scripts\build_input\ -ErrorAction SilentlyContinue
          Copy-Item -Recurse build\flutter_assets scripts\build_input\
          Copy-Item -Recurse build\native_assets scripts\build_input\ -ErrorAction SilentlyContinue
        shell: pwsh

      - name: Create installer
        run: |
          choco install innosetup -y --no-progress
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" scripts\windows_installer.iss
        shell: pwsh

      - uses: actions/upload-artifact@v4
        with:
          name: billbuddy-windows
          path: output/billbuddy-setup-*.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter pub get
      - run: flutter build macos --release

      - name: Create DMG
        run: |
          chmod +x scripts/create_dmg.sh
          bash scripts/create_dmg.sh

      - uses: actions/upload-artifact@v4
        with:
          name: billbuddy-macos
          path: output/billbuddy-macos-*.dmg

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ninja-build libgtk-3-dev
          flutter config --enable-linux-desktop

      - run: flutter pub get
      - run: flutter build linux --release

      - name: Create .deb package
        run: |
          chmod +x scripts/linux_package.sh
          bash scripts/linux_package.sh

      - uses: actions/upload-artifact@v4
        with:
          name: billbuddy-linux
          path: output/billbuddy-*.deb

  # ── Release: runs only on tag push (v*) ──────────────────────
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: billbuddy-windows
          path: release/

      - uses: actions/download-artifact@v4
        with:
          name: billbuddy-macos
          path: release/

      - uses: actions/download-artifact@v4
        with:
          name: billbuddy-linux
          path: release/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: BillBuddy ${{ github.ref_name }}
          body: |
            ## BillBuddy ${{ github.ref_name }}

            ### 下载安装包

            | 平台 | 文件 |
            |------|------|
            | 🪟 Windows | `billbuddy-setup-*.exe` |
            | 🍎 macOS | `billbuddy-macos-*.dmg` |
            | 🐧 Linux | `billbuddy-*.deb` |

            ### 安装方式

            **Windows:** 下载 .exe 双击安装
            **macOS:** 下载 .dmg 拖到 Applications
            **Linux:** `sudo dpkg -i billbuddy-*.deb`
          files: |
            release/*
