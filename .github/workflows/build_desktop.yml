name: Build Desktop

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter pub get
      - run: flutter build windows --release

      - name: Create installer
        run: |
          choco install innosetup -y --no-progress
          "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" scripts/windows_installer.iss
        shell: pwsh

      - uses: actions/upload-artifact@v4
        with:
          name: billbuddy-windows
          path: scripts/output/billbuddy-setup-*.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter pub get
      - run: flutter build macos --release

      - name: Create DMG
        run: |
          chmod +x scripts/create_dmg.sh
          bash scripts/create_dmg.sh

      - uses: actions/upload-artifact@v4
        with:
          name: billbuddy-macos
          path: scripts/output/billbuddy-macos-*.dmg

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ninja-build libgtk-3-dev
          flutter config --enable-linux-desktop

      - run: flutter pub get
      - run: flutter build linux --release

      - name: Create .deb package
        run: |
          chmod +x scripts/linux_package.sh
          bash scripts/linux_package.sh

      - uses: actions/upload-artifact@v4
        with:
          name: billbuddy-linux
          path: scripts/output/billbuddy-*.deb
