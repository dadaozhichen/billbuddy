<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2E7D32"/>
      <stop offset="100%" stop-color="#1B5E20"/>
    </linearGradient>
    <radialGradient id="coin" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFD54F"/>
      <stop offset="100%" stop-color="#FF8F00"/>
    </radialGradient>
  </defs>

  <!-- Rounded square background -->
  <rect x="0" y="0" width="1024" height="1024" rx="225" ry="225" fill="url(#bg)"/>

  <!-- Inner shadow layer (simulated) -->
  <rect x="82" y="102" width="860" height="860" rx="180" ry="180" fill="rgba(0,0,0,0.08)"/>

  <!-- White receipt card -->
  <rect x="205" y="287" width="614" height="512" rx="60" ry="60" fill="white"/>

  <!-- Receipt fold (top-right corner) -->
  <polygon points="717,287 717,430 819,430" fill="#E8F5E9"/>

  <!-- Receipt lines -->
  <line x1="307" y1="389" x2="614" y2="389" stroke="#C8E6C9" stroke-width="18" stroke-linecap="round"/>
  <line x1="307" y1="461" x2="614" y2="461" stroke="#C8E6C9" stroke-width="18" stroke-linecap="round"/>
  <line x1="307" y1="533" x2="614" y2="533" stroke="#C8E6C9" stroke-width="18" stroke-linecap="round"/>
  <line x1="307" y1="605" x2="512" y2="605" stroke="#C8E6C9" stroke-width="18" stroke-linecap="round"/>

  <!-- Golden coin -->
  <circle cx="512" cy="532" r="164" fill="url(#coin)"/>
  <circle cx="512" cy="532" r="115" fill="rgba(255,249,196,0.4)"/>

  <!-- ¥ symbol (simplified as two paths) -->
  <line x1="455" y1="460" x2="569" y2="460" stroke="#E65100" stroke-width="36" stroke-linecap="round"/>
  <line x1="512" y1="460" x2="512" y2="604" stroke="#E65100" stroke-width="36" stroke-linecap="round"/>
  <line x1="475" y1="540" x2="549" y2="540" stroke="#E65100" stroke-width="36" stroke-linecap="round"/>
</svg>
